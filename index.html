<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Course Companion - Courses & Assessments</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/navbar.css">
    <link rel="stylesheet" href="styles/courses.css">
    <link rel="stylesheet" href="styles/course-details.css">
    <link rel="stylesheet" href="styles/forms.css">
    <link rel="stylesheet" href="styles/responsive.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">Smart Course Companion</span>
            </div>
            <div class="navbar-menu">
                <a href="#" class="nav-link active" onclick="showCoursesPage(event)">My Courses</a>
                <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
                    🌙
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Courses Page -->
        <div id="coursesPage" class="page active">
            <div class="courses-header">
                <h1>My Courses</h1>
                <button class="btn btn-primary" onclick="toggleCreateCourseForm()" id="addCourseBtn">
                    + Add New Course
                </button>
            </div>

            <!-- Create Course Form -->
            <div id="createCourseFormContainer" class="form-container hidden">
                <form id="createCourseForm" class="course-form" onsubmit="handleCreateCourse(event)">
                    <h2>Add New Course</h2>
                    
                    <div class="form-group">
                        <label for="courseCode">Course Code *</label>
                        <input 
                            type="text" 
                            id="courseCode" 
                            name="courseCode"
                            placeholder="e.g., SOEN 287"
                            required
                        >
                        <span class="error-message" id="courseCodeError"></span>
                    </div>

                    <div class="form-group">
                        <label for="courseName">Course Name *</label>
                        <input 
                            type="text" 
                            id="courseName" 
                            name="courseName"
                            placeholder="e.g., Web Programming"
                            required
                        >
                        <span class="error-message" id="courseNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="instructor">Instructor *</label>
                        <input 
                            type="text" 
                            id="instructor" 
                            name="instructor"
                            placeholder="e.g., Dr. John Smith"
                            required
                        >
                        <span class="error-message" id="instructorError"></span>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="term">Term</label>
                            <select id="term" name="term">
                                <option>Winter 2026</option>
                                <option>Summer 2026</option>
                                <option>Fall 2026</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="credits">Credits</label>
                            <input 
                                type="number" 
                                id="credits" 
                                name="credits"
                                min="1" 
                                max="4" 
                                value="3"
                            >
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="description">Description</label>
                        <textarea 
                            id="description" 
                            name="description"
                            placeholder="Course description (optional)"
                            rows="3"
                        ></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Create Course</button>
                        <button type="button" class="btn btn-secondary" onclick="toggleCreateCourseForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <!-- Courses Grid -->
            <div id="coursesGrid" class="courses-grid">
                <!-- Course cards will be inserted here -->
            </div>

            <div id="emptyState" class="empty-state hidden">
                <p>No courses yet. Add your first course to get started!</p>
            </div>
        </div>

        <!-- Course Details Page -->
        <div id="courseDetailsPage" class="page">
            <div class="course-details-header">
                <button class="btn btn-back" onclick="showCoursesPage()">← Back to Courses</button>
                <div class="header-actions">
                    <button class="btn btn-icon" id="editCourseBtn" onclick="toggleEditCourseForm()" title="Edit course">✏️</button>
                    <button class="btn btn-icon btn-danger" id="deleteCourseBtn" onclick="handleDeleteCourse()" title="Delete course">🗑️</button>
                </div>
            </div>

            <!-- Edit Course Form -->
            <div id="editCourseFormContainer" class="form-container hidden">
                <form id="editCourseForm" class="course-form" onsubmit="handleEditCourse(event)">
                    <h2>Edit Course</h2>
                    
                    <div class="form-group">
                        <label for="editCourseCode">Course Code *</label>
                        <input 
                            type="text" 
                            id="editCourseCode" 
                            name="courseCode"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="editCourseName">Course Name *</label>
                        <input 
                            type="text" 
                            id="editCourseName" 
                            name="courseName"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="editInstructor">Instructor *</label>
                        <input 
                            type="text" 
                            id="editInstructor" 
                            name="instructor"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="editDescription">Description</label>
                        <textarea 
                            id="editDescription" 
                            name="description"
                            rows="3"
                        ></textarea>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <button type="button" class="btn btn-secondary" onclick="toggleEditCourseForm()">Cancel</button>
                    </div>
                </form>
            </div>

            <div id="courseDetailsContainer" class="course-details-container">
                <!-- Course details will be inserted here -->
            </div>

            <!-- Assessments Section -->
            <div class="assessments-section">
                <div class="assessments-header">
                    <h2>Assessments</h2>
                    <button class="btn btn-secondary" onclick="toggleCreateAssessmentForm()" id="addAssessmentBtn">
                        + Add Assessment
                    </button>
                </div>

                <!-- Create Assessment Form -->
                <div id="createAssessmentFormContainer" class="form-container hidden">
                    <form id="createAssessmentForm" class="assessment-form" onsubmit="handleCreateAssessment(event)">
                        <h3>Add New Assessment</h3>
                        
                        <div class="form-row">
                            <div class="form-group">
                                <label for="assessmentType">Type *</label>
                                <select id="assessmentType" name="assessmentType" required>
                                    <option value="">Select Type</option>
                                    <option value="Assignment">Assignment</option>
                                    <option value="Quiz">Quiz</option>
                                    <option value="Exam">Exam</option>
                                    <option value="Lab">Lab</option>
                                    <option value="Project">Project</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label for="assessmentTitle">Title *</label>
                                <input 
                                    type="text" 
                                    id="assessmentTitle"
                                    name="assessmentTitle"
                                    placeholder="e.g., Assignment 1"
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="assessmentDescription">Description</label>
                            <textarea 
                                id="assessmentDescription"
                                name="assessmentDescription"
                                placeholder="Assessment description (optional)"
                                rows="2"
                            ></textarea>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="dueDate">Due Date *</label>
                                <input 
                                    type="date" 
                                    id="dueDate"
                                    name="dueDate"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="weight">Weight (%) *</label>
                                <input 
                                    type="number" 
                                    id="weight"
                                    name="weight"
                                    min="0" 
                                    max="100"
                                    value="10"
                                    required
                                >
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="totalMarks">Total Marks *</label>
                                <input 
                                    type="number" 
                                    id="totalMarks"
                                    name="totalMarks"
                                    min="0"
                                    value="100"
                                    required
                                >
                            </div>

                            <div class="form-group">
                                <label for="status">Status</label>
                                <select id="status" name="status">
                                    <option value="pending">Pending</option>
                                    <option value="completed">Completed</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Add Assessment</button>
                            <button type="button" class="btn btn-secondary" onclick="toggleCreateAssessmentForm()">Cancel</button>
                        </div>
                    </form>
                </div>

                <div id="assessmentsList" class="assessments-list">
                    <!-- Assessment items will be inserted here -->
                </div>

                <div id="emptyAssessments" class="empty-state hidden">
                    <p>No assessments yet. Add one to get started!</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="js/data-store.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/courses.js"></script>
    <script src="js/assessments.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
